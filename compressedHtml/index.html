<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- 适配移动端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> 压缩html - 示例：倒计时器</title>
    <style>
      /* 全局样式重置 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Microsoft YaHei", sans-serif;
      }

      /* 页面背景与居中布局 */
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #2c3e50, #4ca1af);
        color: white;
      }

      /* 倒计时容器样式 */
      .countdown-container {
        text-align: center;
        background: rgba(0, 0, 0, 0.3);
        padding: 40px 60px;
        border-radius: 15px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      }

      /* 标题样式 */
      .countdown-title {
        font-size: 28px;
        margin-bottom: 30px;
        letter-spacing: 2px;
      }

      /* 时间数字展示区域 */
      .time-box {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-bottom: 20px;
      }

      /* 单个时间项样式 */
      .time-item {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 10px;
        min-width: 80px;
      }

      /* 时间数字 */
      .time-number {
        font-size: 36px;
        font-weight: bold;
      }

      /* 时间单位 */
      .time-label {
        font-size: 14px;
        margin-top: 5px;
        opacity: 0.8;
      }

      /* 结束提示文字 */
      .finished-text {
        font-size: 24px;
        color: #ff6b6b;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="countdown-container">
      <h2 class="countdown-title">距离目标时间还有</h2>
      <div class="time-box">
        <div class="time-item">
          <div class="time-number" id="days">00</div>
          <div class="time-label">天</div>
        </div>
        <div class="time-item">
          <div class="time-number" id="hours">00</div>
          <div class="time-label">时</div>
        </div>
        <div class="time-item">
          <div class="time-number" id="minutes">00</div>
          <div class="time-label">分</div>
        </div>
        <div class="time-item">
          <div class="time-number" id="seconds">00</div>
          <div class="time-label">秒</div>
        </div>
      </div>
      <h3 class="finished-text" id="finished">时间已到！</h3>
    </div>

    <script>
      // ===================== 自定义目标日期 =====================
      // 格式：年-月-日 时:分:秒  可自行修改
      const targetDate = new Date("2026-05-01 00:00:00").getTime();

      // 倒计时函数
      function countdown() {
        const now = new Date().getTime();
        const timeDiff = targetDate - now;

        // 时间计算
        const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
        const hours = Math.floor(
          (timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );
        const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

        // 补零（小于10显示01、02）
        document.getElementById("days").innerText = days
          .toString()
          .padStart(2, "0");
        document.getElementById("hours").innerText = hours
          .toString()
          .padStart(2, "0");
        document.getElementById("minutes").innerText = minutes
          .toString()
          .padStart(2, "0");
        document.getElementById("seconds").innerText = seconds
          .toString()
          .padStart(2, "0");

        // 倒计时结束
        if (timeDiff < 0) {
          clearInterval(timer);
          document.querySelector(".time-box").style.display = "none";
          document.getElementById("finished").style.display = "block";
        }
      }

      // 立即执行一次，避免刷新延迟
      countdown();
      // 每秒刷新一次
      const timer = setInterval(countdown, 1000);
    </script>
  </body>
</html>
